<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Artigo</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="/css/style.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- for dark mode persistance -->
  <script>
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>

</head>
<body>
  <header>
    <h2>Renato Lóis</h2>
    <button id="toggleDark">
     <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 512 512">
        <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.56 122.88"><defs><style>.cls-1{fill-rule:evenodd;}</style></defs><title>night</title><path class="cls-1" d="M121.85,87.3A64.31,64.31,0,1,1,36.88.4c2.94-1.37,5.92.91,4.47,4.47a56.29,56.29,0,0,0,75.75,77.4l.49-.27a3.41,3.41,0,0,1,4.61,4.61l-.35.69ZM92.46,74.67H92A16.11,16.11,0,0,0,76.2,58.93v-.52a15.08,15.08,0,0,0,11-4.72,15.19,15.19,0,0,0,4.72-11h.51a15.12,15.12,0,0,0,4.72,11,15.12,15.12,0,0,0,11,4.72v.51A16.13,16.13,0,0,0,92.46,74.67Zm10.09-46.59h-.27a7.94,7.94,0,0,0-2.49-5.81A7.94,7.94,0,0,0,94,19.78v-.27A7.94,7.94,0,0,0,99.79,17a8,8,0,0,0,2.49-5.8h.27A8,8,0,0,0,105,17a8,8,0,0,0,5.81,2.49v.27A8,8,0,0,0,105,22.27a7.94,7.94,0,0,0-2.49,5.81Zm-41.5,8h-.41a12.06,12.06,0,0,0-3.78-8.82A12.06,12.06,0,0,0,48,23.5v-.41a12.07,12.07,0,0,0,8.82-3.78,12.09,12.09,0,0,0,3.78-8.82h.41a12.08,12.08,0,0,0,3.77,8.82,12.09,12.09,0,0,0,8.83,3.78v.41a12.09,12.09,0,0,0-8.83,3.78,12.08,12.08,0,0,0-3.77,8.82Z"/></svg>
      </svg>
    </button>
  </header>

  <article>
    <header>
      <h1 id="title"></h1>
      <div id="meta">
        <p id="date"></p>
        <ul id="tags"></ul>
      </div>
    </header>
    <main>
      <div id="content"></div>
    </main>
  </article>

  <footer>
    <p>© Renato Lóis</p>
  </footer>

  <script>  
    document.getElementById('toggleDark').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    });

    const url = window.location.origin + "/api/article/" + window.location.pathname.split("/").pop();
    axios.get(url, {
      validateStatus: function (status) {
        return (
          status == 200 ||
          status == 201 ||
          status == 404 ||
          status == 409 ||
          status == 500
        );
    }})
    .then(response => {
      const a = Array.isArray(response.data) ? response.data[0] : response.data;

      if (a.error) {
        document.getElementById('title').textContent = `Error ${response.status}`;
        document.getElementById('date').textContent = "";
        document.getElementById('content').textContent = a.error;
        return;
      }

      document.getElementById('title').textContent = a.title;
      document.getElementById('date').textContent = new Date(a.date).toLocaleString();
      document.getElementById('content').innerHTML = marked.parse(a.content);

      const tagsUl = document.getElementById('tags');
      tagsUl.innerHTML = '';
      a.article_tag.forEach(t => {
        const li = document.createElement('li');
        const link = document.createElement('a');
        link.href = `/?tag=${encodeURIComponent(t.tag.name)}`;
        link.textContent = t.tag.name;
        link.style.color = 'inherit';
        link.style.textDecoration = 'none';
        li.appendChild(link);
        tagsUl.appendChild(li);
      });
    }).catch(error => {
      let errorTitle = error.response ? "Internal error" : "Network error";

      document.getElementById('title').textContent = errorTitle;
      document.getElementById('date').textContent = "";
      document.getElementById('content').textContent = "Try again later";
      const tagsUl = document.getElementById('tags');
      tagsUl.innerHTML = '';
    });
  </script>
</body>
</html>
